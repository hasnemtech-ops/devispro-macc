directories:
  output: dist
  buildResources: build
appId: com.devispro.app
productName: Devis Pro
asar: true
publish: null
files:
  - filter:
      - main.js
      - electricien-devis.html
      - icon.png
icon: icon.png
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: nsis
      arch:
        - ia32
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.business
electronVersion: 22.3.27
