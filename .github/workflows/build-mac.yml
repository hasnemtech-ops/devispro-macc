name: Build macOS (.dmg)

# Se lance automatiquement à chaque envoi de code sur "main",
# et peut aussi être lancé manuellement depuis l'onglet "Actions" de GitHub.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dépendances
        run: npm install

      - name: Compiler l'application Mac (.dmg)
        run: npm run dist:mac

      - name: Publier le résultat en téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: DevisPro-Mac
          path: dist/*.dmg
          if-no-files-found: error
